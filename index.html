<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biblioteca de Prompts Premium</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: rgba(255,255,255,0.07);
    --text: #e8e6f0;
    --muted: #7a7890;
    --accent1: #c8a96e;
    --accent2: #7c6af5;
    --accent3: #e8736a;
    --accent4: #5bc4a0;
    --accent5: #e87fd4;
    --accent6: #5baee8;
    --accent7: #e8c45b;
    --accent8: #a0e87f;
    --accent9: #e88a5b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Noise texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  header {
    position: relative;
    text-align: center;
    padding: 80px 20px 60px;
    overflow: hidden;
  }

  header::before {
    content: '';
    position: absolute;
    top: -100px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(200,169,110,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .badge {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent1);
    border: 1px solid rgba(200,169,110,0.3);
    padding: 6px 16px;
    border-radius: 2px;
    margin-bottom: 24px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(42px, 7vw, 80px);
    font-weight: 900;
    line-height: 1.05;
    letter-spacing: -1px;
    margin-bottom: 20px;
  }

  h1 em {
    font-style: italic;
    color: var(--accent1);
  }

  .subtitle {
    color: var(--muted);
    font-size: 16px;
    max-width: 500px;
    margin: 0 auto 40px;
    line-height: 1.7;
  }

  .stats-row {
    display: flex;
    justify-content: center;
    gap: 40px;
    flex-wrap: wrap;
  }

  .stat {
    text-align: center;
  }

  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 700;
    color: var(--accent1);
  }

  .stat-label {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Search */
  .search-wrap {
    padding: 0 20px 40px;
    max-width: 600px;
    margin: 0 auto;
  }

  .search-box {
    position: relative;
  }

  .search-box input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 20px 14px 48px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box input:focus { border-color: rgba(200,169,110,0.4); }
  .search-box input::placeholder { color: var(--muted); }

  .search-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 18px;
  }

  /* Filters */
  .filters {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 0 20px 40px;
    max-width: 1200px;
    margin: 0 auto;
    scrollbar-width: none;
  }

  .filters::-webkit-scrollbar { display: none; }

  .filter-btn {
    flex-shrink: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 8px 18px;
    border-radius: 100px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }

  .filter-btn:hover { border-color: rgba(255,255,255,0.15); color: var(--text); }
  .filter-btn.active { background: var(--accent1); border-color: var(--accent1); color: #0a0a0f; font-weight: 600; }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 20px;
    padding: 0 20px 80px;
    max-width: 1200px;
    margin: 0 auto;
  }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: all 0.3s;
    animation: fadeUp 0.5s ease both;
  }

  .card:hover {
    transform: translateY(-4px);
    border-color: rgba(255,255,255,0.12);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    padding: 20px 20px 16px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    border-bottom: 1px solid var(--border);
  }

  .card-icon {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  .card-meta { flex: 1; }

  .card-category {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 4px;
    font-family: 'DM Mono', monospace;
  }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 700;
    line-height: 1.3;
    color: var(--text);
  }

  .card-count {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
  }

  .prompts-list {
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .prompt-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    position: relative;
    cursor: pointer;
    transition: all 0.2s;
    group: true;
  }

  .prompt-item:hover {
    border-color: rgba(255,255,255,0.12);
    background: #20202e;
  }

  .prompt-text {
    font-size: 13px;
    line-height: 1.6;
    color: #c4c2d4;
    padding-right: 32px;
  }

  .prompt-text strong {
    color: var(--text);
    font-weight: 600;
  }

  .copy-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 4px;
    border-radius: 4px;
    font-size: 14px;
    transition: all 0.2s;
    opacity: 0;
  }

  .prompt-item:hover .copy-btn { opacity: 1; }
  .copy-btn:hover { color: var(--accent1); }

  .copy-btn.copied { color: var(--accent4) !important; opacity: 1 !important; }

  .card-footer {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .show-more {
    background: transparent;
    border: none;
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: color 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .show-more:hover { color: var(--text); }

  .copy-all {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    padding: 5px 12px;
    border-radius: 6px;
    transition: all 0.2s;
  }

  .copy-all:hover { border-color: var(--accent1); color: var(--accent1); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: var(--surface2);
    border: 1px solid rgba(91,196,160,0.3);
    color: var(--accent4);
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-family: 'DM Mono', monospace;
    transform: translateY(20px);
    opacity: 0;
    transition: all 0.3s;
    z-index: 100;
  }

  .toast.show { transform: translateY(0); opacity: 1; }

  /* Hidden */
  .hidden { display: none !important; }

  .divider {
    height: 1px;
    background: var(--border);
    max-width: 1200px;
    margin: 0 auto 40px;
  }

  .section-label {
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 30px;
    padding: 0 20px;
  }

  .no-results {
    text-align: center;
    color: var(--muted);
    padding: 60px 20px;
    grid-column: 1/-1;
    font-size: 16px;
  }

  .no-results span { font-size: 40px; display: block; margin-bottom: 16px; }

  @media (max-width: 768px) {
    .grid { grid-template-columns: 1fr; }
    .stats-row { gap: 24px; }
  }
</style>
</head>
<body>

<header>
  <div class="badge">✦ Biblioteca Premium de Prompts</div>
  <h1>Prompts para<br><em>E-books</em> de Sucesso</h1>
  <p class="subtitle">Coleção curada de prompts profissionais para criar e-books que vendem em todos os nichos mais lucrativos.</p>
  <div class="stats-row">
    <div class="stat"><div class="stat-num">9</div><div class="stat-label">Categorias</div></div>
    <div class="stat"><div class="stat-num">180+</div><div class="stat-label">Prompts</div></div>
    <div class="stat"><div class="stat-num">100%</div><div class="stat-label">Prontos para Usar</div></div>
  </div>
</header>

<div class="search-wrap">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Buscar prompts por palavra-chave..." oninput="filterAll()">
  </div>
</div>

<div class="filters" id="filters">
  <button class="filter-btn active" onclick="setFilter('todos', this)">Todos</button>
  <button class="filter-btn" onclick="setFilter('receitas', this)">🍽️ Receitas</button>
  <button class="filter-btn" onclick="setFilter('meditacao', this)">🧘 Meditação</button>
  <button class="filter-btn" onclick="setFilter('nicho', this)">🎯 Nicho</button>
  <button class="filter-btn" onclick="setFilter('afirmacoes', this)">✨ Afirmações</button>
  <button class="filter-btn" onclick="setFilter('vendas', this)">💰 Vendas</button>
  <button class="filter-btn" onclick="setFilter('dropshipping', this)">📦 Dropshipping</button>
  <button class="filter-btn" onclick="setFilter('produtividade', this)">⏰ Produtividade</button>
  <button class="filter-btn" onclick="setFilter('instagram', this)">📱 Instagram</button>
  <button class="filter-btn" onclick="setFilter('ia', this)">🤖 Conteúdo IA</button>
</div>

<div class="grid" id="grid"></div>

<div class="toast" id="toast">✓ Copiado para a área de transferência</div>

<script>
const data = [
  {
    id: "receitas",
    category: "E-book de Receitas",
    icon: "🍽️",
    color: "#e87f5b",
    bg: "rgba(232,127,91,0.12)",
    prompts: [
      { text: "Crie um <strong>índice completo</strong> para um e-book de receitas fitness com 30 receitas low carb, organizadas por café da manhã, almoço, jantar e snacks. Inclua tempo de preparo e nível de dificuldade." },
      { text: "Escreva uma <strong>introdução envolvente</strong> para um e-book de receitas italianas autênticas, contando a história da culinária italiana e por que essas receitas são especiais para reuniões em família." },
      { text: "Desenvolva uma <strong>ficha técnica completa</strong> para a receita de bolo de chocolate sem glúten: ingredientes com medidas precisas, modo de preparo passo a passo, dicas do chef, variações e informação nutricional." },
      { text: "Crie <strong>10 dicas práticas de mise en place</strong> para iniciantes na cozinha, explicando cada uma de forma simples e como elas economizam tempo e evitam desperdício." },
      { text: "Escreva um capítulo sobre <strong>substituições inteligentes</strong> em receitas para veganos, com tabela de substituição de ovos, laticínios e carnes por ingredientes plant-based." },
      { text: "Crie uma <strong>lista de compras semanal</strong> para um plano de 7 dias baseado nas receitas do e-book, com quantidades exatas e custo estimado por porção." },
      { text: "Desenvolva uma seção de <strong>erros comuns na cozinha</strong> e como evitá-los, com explicações científicas simples sobre por que cada erro acontece." },
      { text: "Escreva a <strong>biografia da autora</strong> do e-book de receitas: chef apaixonada, mãe de 2 filhos, que transformou sua cozinha caseira em um negócio de sucesso — tom acolhedor e inspirador." },
      { text: "Crie <strong>variações de dificuldade</strong> para cada receita: versão iniciante (15 min), versão intermediária (30 min) e versão gourmet (1 hora), explicando as diferenças técnicas." },
      { text: "Escreva uma seção <strong>'Harmonizações e Apresentação'</strong> ensinando como empratar de forma instagramável em 5 passos simples, com exemplos de guarnições." },
      { text: "Crie um capítulo completo sobre <strong>técnicas de conservação de alimentos</strong>: como congelar corretamente cada tipo de ingrediente, duração, embalagem ideal e como reutilizar sobras com novas receitas criativas." },
      { text: "Escreva uma seção sobre <strong>culinária afetiva e memórias gustativas</strong>: como apresentar cada receita com uma história pessoal de 3 parágrafos que cria conexão emocional com o leitor antes do passo a passo." },
      { text: "Desenvolva um <strong>glossário culinário</strong> com 40 termos técnicos explicados de forma simples para iniciantes: de 'al dente' a 'zeste', com dicas de como dominar cada técnica em casa." },
      { text: "Crie um capítulo de <strong>receitas de emergência</strong>: 10 pratos deliciosos feitos em menos de 20 minutos com ingredientes básicos de despensa, perfeitos para dias corridos." },
      { text: "Escreva um guia de <strong>temperos e especiarias do mundo</strong>: como usar açafrão, za'atar, sumac, harissa e outros ingredientes exóticos para transformar receitas simples em pratos sofisticados." },
      { text: "Desenvolva um capítulo sobre <strong>planejamento de cardápio para festas</strong>: menu completo para 10, 20 e 50 pessoas, cronograma de preparo e dicas para servir de forma elegante sem stress." },
      { text: "Crie uma seção de <strong>receitas econômicas gourmet</strong>: 8 pratos com menos de R$20 por porção que parecem de restaurante, com dicas de apresentação que enganam qualquer convidado." },
      { text: "Escreva um capítulo sobre <strong>a ciência do sabor</strong>: como o equilíbrio entre doce, salgado, azedo, amargo e umami funciona e como ajustar qualquer receita que ficou sem graça usando essa fórmula." },
      { text: "Desenvolva um <strong>calendário sazonal de ingredientes</strong>: mês a mês, quais frutas, legumes e proteínas estão no pico de sabor e nutrição no Brasil, com uma receita exclusiva para cada período." },
      { text: "Crie um capítulo de <strong>drinks e sobremesas express</strong>: 10 receitas de bebidas artesanais e 10 sobremesas de 5 ingredientes para encerrar qualquer refeição de forma marcante e fácil." }
    ]
  },
  {
    id: "meditacao",
    category: "Meditações Guiadas",
    icon: "🧘",
    color: "#7c6af5",
    bg: "rgba(124,106,245,0.12)",
    prompts: [
      { text: "Escreva um <strong>script de meditação guiada</strong> de 10 minutos para reduzir a ansiedade antes de dormir, usando técnica de body scan progressivo, com linguagem suave e pausas indicadas." },
      { text: "Crie uma <strong>meditação de visualização criativa</strong> de 15 minutos focada em abundância e prosperidade, com cenário detalhado de praia ao pôr do sol, ancoragem sensorial completa." },
      { text: "Desenvolva um <strong>script de respiração 4-7-8</strong> para iniciantes, explicando a técnica, seus benefícios científicos e guiando a prática por 8 minutos com contagem." },
      { text: "Escreva uma <strong>meditação de autocompaixão</strong> baseada em técnicas de mindfulness de 12 minutos, especialmente para pessoas que sofrem de autocrítica severa ou perfeccionismo." },
      { text: "Crie uma <strong>meditação matinal energizante</strong> de 7 minutos para ativar o sistema nervoso parassimpático, com afirmações integradas e exercícios de intenção para o dia." },
      { text: "Desenvolva um <strong>script de meditação para crianças</strong> de 5 a 10 anos, com história de uma borboleta mágica, linguagem lúdica e técnicas de atenção plena adaptadas." },
      { text: "Escreva uma <strong>meditação de cura emocional</strong> de 20 minutos integrando técnicas de EFT (tapping) e visualização, para liberação de mágoas e ressentimentos do passado." },
      { text: "Crie um <strong>programa de 30 dias de meditação</strong> para iniciantes com estrutura progressiva, incluindo temas semanais, duração crescente e exercícios complementares." },
      { text: "Desenvolva uma <strong>meditação para foco e produtividade</strong> de 10 minutos, usando técnica Pomodoro mental, ideal para antes de sessões de trabalho intenso." },
      { text: "Escreva uma <strong>introdução científica</strong> sobre os benefícios da meditação para o e-book, citando estudos de neurociência sobre neuroplasticidade, cortisol e bem-estar geral." },
      { text: "Crie um <strong>script de meditação de gratidão</strong> de 8 minutos com ancoragem corporal, técnica de escaneamento de memórias positivas e ritual de fechamento com intenção para o dia." },
      { text: "Escreva uma <strong>meditação Yoga Nidra</strong> completa de 25 minutos — a 'soneca yóguica' — com rotação de consciência pelas 61 partes do corpo, visualização e estado hipnagógico guiado." },
      { text: "Desenvolva um <strong>guia de meditação em movimento</strong>: técnicas de mindful walking, meditação em movimento consciente e como integrar atenção plena em atividades cotidianas como comer e lavar louça." },
      { text: "Crie um <strong>script de meditação para luto e perda</strong> de 18 minutos com técnicas de Compassion Focused Therapy, reconhecimento das emoções sem julgamento e ancoragem no presente." },
      { text: "Escreva uma <strong>meditação de chakras completa</strong> de 30 minutos, passando pelos 7 centros energéticos com visualização de cores, afirmações específicas e técnicas de respiração para cada chakra." },
      { text: "Desenvolva um <strong>script de meditação para ansiedade social</strong> de 12 minutos, incluindo técnica de dessensibilização por imaginação, reprogramação de crenças sociais e âncora de segurança." },
      { text: "Crie uma <strong>meditação de integração após o trabalho</strong> de 10 minutos para fazer a transição entre vida profissional e pessoal, com ritual de 'descompressão' e ativação do modo descanso." },
      { text: "Escreva um <strong>guia de meditação com sons binaurais</strong>: o que são, frequências para cada objetivo (foco, relaxamento, criatividade, sono), como criar uma playlist e integrar ao e-book com QR codes." },
      { text: "Desenvolva um <strong>script de meditação para dor crônica</strong> baseado em MBSR (Mindfulness-Based Stress Reduction), com técnicas validadas clinicamente para mudança de relação com o desconforto físico." },
      { text: "Crie um <strong>capítulo sobre obstáculos comuns na meditação</strong>: mente dispersa, sono durante a prática, impaciência, dúvida — com estratégias práticas para cada desafio e normalização do processo." }
    ]
  },
  {
    id: "nicho",
    category: "Prompts para Nicho",
    icon: "🎯",
    color: "#5baee8",
    bg: "rgba(91,174,232,0.12)",
    prompts: [
      { text: "Analise o nicho de <strong>[insira seu nicho]</strong> e identifique os 5 maiores problemas que o público-alvo enfrenta, os desejos mais profundos que têm e as objeções que impediriam a compra de um e-book." },
      { text: "Crie um <strong>avatar de cliente ideal</strong> para o nicho de [nicho], com nome fictício, idade, profissão, renda, dores emocionais, objetivos, plataformas que usa e linguagem que ressoa com ele." },
      { text: "Desenvolva <strong>10 títulos magnéticos</strong> para um e-book no nicho de [nicho], usando gatilhos de curiosidade, urgência e benefício claro, com subtítulos explicativos." },
      { text: "Mapeie a <strong>jornada de transformação</strong> do leitor ideal do nicho [nicho]: antes (situação atual, frustrações), durante (insights do e-book) e depois (resultado transformador prometido)." },
      { text: "Crie uma <strong>pesquisa de validação</strong> com 10 perguntas estratégicas para descobrir se o público-alvo do nicho [nicho] pagaria por um e-book e quanto investiria." },
      { text: "Escreva a <strong>proposta de valor única</strong> do e-book para [nicho], diferenciando-o dos concorrentes gratuitos e explicando por que este conteúdo vale o investimento." },
      { text: "Identifique os <strong>principais concorrentes</strong> no nicho [nicho] no digital, analise seus pontos fracos e crie uma estratégia de posicionamento diferenciado para o meu e-book." },
      { text: "Crie um <strong>mapa de conteúdo completo</strong> para um e-book de [nicho] com 8 capítulos, cada um resolvendo uma dor específica do avatar, com títulos, subtemas e call-to-actions." },

let currentFilter = 'todos';
let expandedCards = {};

function renderGrid(filteredData) {
  const grid = document.getElementById('grid');
  
  if (filteredData.length === 0) {
    grid.innerHTML = '<div class="no-results"><span>🔍</span>Nenhum prompt encontrado.<br>Tente outra palavra-chave.</div>';
    return;
  }

  grid.innerHTML = filteredData.map((cat, idx) => {
    const isExpanded = expandedCards[cat.id];
    const visiblePrompts = isExpanded ? cat.prompts : cat.prompts.slice(0, 3);
    
    return `
    <div class="card" data-category="${cat.id}" style="animation-delay:${idx * 0.06}s">
      <div class="card-header">
        <div class="card-icon" style="background:${cat.bg}; font-size:22px">${cat.icon}</div>
        <div class="card-meta">
          <div class="card-category" style="color:${cat.color}">${cat.category}</div>
          <div class="card-title">${cat.category}</div>
          <div class="card-count">${cat.prompts.length} prompts prontos para usar</div>
        </div>
      </div>
      <div class="prompts-list">
        ${visiblePrompts.map((p, i) => `
          <div class="prompt-item" onclick="copyPrompt(this, ${idx}, ${i})">
            <div class="prompt-text">${p.text}</div>
            <button class="copy-btn" title="Copiar">📋</button>
          </div>
        `).join('')}
      </div>
      <div class="card-footer">
        <button class="show-more" onclick="toggleExpand('${cat.id}')">
          ${isExpanded ? '▲ Mostrar menos' : `▼ Ver mais ${cat.prompts.length - 3} prompts`}
        </button>
        <button class="copy-all" onclick="copyAll(${idx})">Copiar todos</button>
      </div>
    </div>`;
  }).join('');
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterAll();
}

function filterAll() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  
  let filtered = data.filter(cat => {
    if (currentFilter !== 'todos' && cat.id !== currentFilter) return false;
    if (!search) return true;
    return cat.prompts.some(p => p.text.toLowerCase().includes(search)) ||
           cat.category.toLowerCase().includes(search);
  });

  if (search) {
    filtered = filtered.map(cat => ({
      ...cat,
      prompts: cat.prompts.filter(p => p.text.toLowerCase().includes(search))
    })).filter(cat => cat.prompts.length > 0);
  }

  renderGrid(filtered);
}

function toggleExpand(id) {
  expandedCards[id] = !expandedCards[id];
  filterAll();
  setTimeout(() => {
    document.querySelector(`[data-category="${id}"]`)?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 100);
}

function stripHtml(html) {
  return html.replace(/<[^>]*>/g, '').replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>');
}

function copyPrompt(el, catIdx, promptIdx) {
  const cat = data[catIdx];
  const text = stripHtml(cat.prompts[promptIdx].text);
  navigator.clipboard.writeText(text).then(() => {
    const btn = el.querySelector('.copy-btn');
    btn.textContent = '✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋'; btn.classList.remove('copied'); }, 2000);
    showToast('Prompt copiado!');
  });
}

function copyAll(catIdx) {
  const cat = data[catIdx];
  const text = cat.prompts.map((p, i) => `${i+1}. ${stripHtml(p.text)}`).join('\n\n');
  navigator.clipboard.writeText(text).then(() => showToast(`${cat.prompts.length} prompts copiados!`));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = '✓ ' + msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

renderGrid(data);
</script>
